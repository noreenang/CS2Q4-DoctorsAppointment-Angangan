{% extends "base.html" %}
{% block title %}Edit Your Profile{% endblock %}

{% block content %}
<div class="container">
    <h2>Edit Your Profile</h2>
    
    <form method="post" action="{{ url_for('update_profile') }}">
        <div class="form-group">
            <label class="field-label">Name</label>
            <input id="name" name="name" type="text" value="{{ patient.name }}" class="form-input" required>
        </div>
        
        <div class="form-group">
            <label class="field-label">Age</label>
            <input id="age" name="age" type="number" value="{{ patient.age }}" class="form-input" min="1" required>
        </div>
        
        <div class="form-group">
            <label class="field-label">Address</label>
            <input id="address" name="address" type="text" value="{{ patient.address }}" class="form-input" required>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="update-btn">Update</button>
            <a href="{{ url_for('dashboard') }}" class="button back-link">Cancel</a>
        </div>
    </form>
</div>

<style>
    .form-group {
        margin-bottom: 1.5rem;
        display: flex;
        flex-direction: column;
    }
    
    .field-label {
        font-size: 0.85rem;
        font-weight: 700;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, #f0f0f0 0%, #f8f8f8 100%);
        padding: 0.5rem 0.75rem;
        border-radius: 3px;
        border-left: 4px solid #4CAF50;
    }
    
    .form-input {
        padding: 0.7rem;
        font-size: 1rem;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-family: inherit;
    }
    
    .form-input:focus {
        outline: none;
        border-color: #4CAF50;
        box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
    }
    
    .form-actions {
        display: flex;
        gap: 1rem;
        margin-top: 2rem;
    }
    
    .update-btn {
        background-color: #4CAF50;
        color: white;
        padding: 0.7rem 1.5rem;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 600;
    }
    
    .update-btn:hover {
        background-color: #45a049;
    }
    
    .back-link {
        background-color: #888;
        color: white;
        padding: 0.7rem 1.5rem;
        border-radius: 4px;
        text-decoration: none;
        display: inline-block;
        font-weight: 600;
    }
    
    .back-link:hover {
        background-color: #555;
    }
</style>
{% endblock %}
