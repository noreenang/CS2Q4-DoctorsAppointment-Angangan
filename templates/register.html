{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="container">
    <h2>Patient Registration</h2>
    <form method="POST">
        <div class="form-group">
            <label class="field-label" for="username">Username</label>
            <input id="username" class="form-input" type="text" name="username" placeholder="Username" required>
        </div>

        <div class="form-group">
            <label class="field-label" for="password">Password</label>
            <input id="password" class="form-input" type="password" name="password" placeholder="Password" required>
        </div>

        <div class="form-group">
            <label class="field-label" for="name">Full Name</label>
            <input id="name" class="form-input" type="text" name="name" placeholder="Full Name" required>
        </div>

        <div class="form-group">
            <label class="field-label" for="age">Age</label>
            <input id="age" class="form-input" type="number" name="age" placeholder="Age" min="1" step="1" required>
        </div>

        <div class="form-group">
            <label class="field-label" for="address">Address</label>
            <input id="address" class="form-input" type="text" name="address" placeholder="Address" required>
        </div>

        <button type="submit">Register</button>
    </form>
    <p>Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
</div>
{% endblock %}
